name: Continuous Integration

on:
  push:
    branches:
      - main
      - feature/**
      - chore/**
      - docs/**

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  ci:

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew clean test --stacktrace --info --no-daemon

      - name: Build executable JAR
        run: ./gradlew bootJar --no-daemon

      - name: Verify generated JAR
        run: ls -lh build/libs

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: github.ref == 'refs/heads/main'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ github.ref == 'refs/heads/main' && steps.meta.outputs.tags || 'finance-api:ci' }}
          labels: ${{ github.ref == 'refs/heads/main' && steps.meta.outputs.labels || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max